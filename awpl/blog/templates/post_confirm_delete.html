{% extends 'layout.html' %}

{% block head %}
    
{% endblock %}

{% block title %}Post Delete Confirmation{% endblock %}

{% block content %}
    <h1>Confirm Deletion</h1>
    <p>Are you sure you want to delete the post titled "{{ post.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Yes, Delete</button>
        <a href="{% url 'blog' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
